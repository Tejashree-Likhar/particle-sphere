<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aether — Hand-Driven Particle Field</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0a0b0d;
    --ink: #eae7e0;
    --muted: #8a8d93;
    --hairline: rgba(234,231,224,0.12);
    --gold: #d4af6a;
    --panel-bg: rgba(10,11,13,0.55);
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0; padding:0; width:100%; height:100%;
    background: var(--bg);
    overflow:hidden;
    font-family:'IBM Plex Mono', monospace;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- layers ---------- */
  #webcam{
    position:fixed; top:0; left:0; width:100%; height:100%;
    object-fit:cover;
    transform: scaleX(-1);
    z-index:0;
    opacity:0;
    filter: saturate(0.75) brightness(0.55) contrast(1.05);
    pointer-events:none;
    transition: opacity .6s ease;
  }
  #webcam.cam-visible{ opacity:1; }

  #vignette{
    position:fixed; inset:0; z-index:1; pointer-events:none;
    background: radial-gradient(ellipse at center, rgba(10,11,13,0) 40%, rgba(10,11,13,0.85) 100%);
  }

  canvas#scene{
    position:fixed; top:0; left:0; width:100%; height:100%;
    z-index:2;
    display:block;
  }

  /* ---------- viewfinder corners (signature detail) ---------- */
  .bracket{
    position:fixed; width:26px; height:26px; z-index:3; pointer-events:none;
    border-color: rgba(234,231,224,0.28);
    border-style: solid;
    border-width:0;
  }
  .bracket.tl{ top:22px; left:22px; border-top-width:1px; border-left-width:1px; }
  .bracket.tr{ top:22px; right:22px; border-top-width:1px; border-right-width:1px; }
  .bracket.bl{ bottom:22px; left:22px; border-bottom-width:1px; border-left-width:1px; }
  .bracket.br{ bottom:22px; right:22px; border-bottom-width:1px; border-right-width:1px; }

  /* ---------- UI ---------- */
  .ui{ position:fixed; inset:0; z-index:4; pointer-events:none; }
  .ui *{ pointer-events:auto; }

  .title-block{
    position:absolute; top:38px; left:44px;
    pointer-events:none;
  }
  .title{
    font-family:'Cormorant Garamond', serif;
    font-weight:500;
    font-style:italic;
    font-size:44px;
    letter-spacing:0.02em;
    margin:0;
    color: var(--ink);
    line-height:1;
  }
  .subtitle{
    margin-top:8px;
    font-size:10px;
    letter-spacing:0.22em;
    text-transform:uppercase;
    color: var(--muted);
  }

  .cam-toggle{
    position:absolute; top:44px; right:44px;
    background: transparent;
    border:1px solid var(--hairline);
    color: var(--ink);
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    padding:11px 16px;
    cursor:pointer;
    transition: border-color .25s ease, background .25s ease;
    backdrop-filter: blur(2px);
  }
  .cam-toggle:hover{ border-color: rgba(234,231,224,0.5); background: rgba(234,231,224,0.05); }
  .cam-toggle .dot{
    display:inline-block; width:6px; height:6px; border-radius:50%;
    background: var(--muted); margin-right:9px; vertical-align:middle;
    transition: background .25s ease;
  }
  .cam-toggle.on .dot{ background: var(--gold); box-shadow:0 0 6px var(--gold); }

  .legend{
    position:absolute; bottom:40px; left:44px;
    font-size:10px; letter-spacing:0.05em; color: var(--muted);
    line-height:2;
    max-width:300px;
  }
  .legend .row{ display:flex; gap:14px; }
  .legend .row span.key{ color: rgba(234,231,224,0.65); min-width:78px; display:inline-block; letter-spacing:0.12em; text-transform:uppercase; font-size:9px;}

  .hud{
    position:absolute; bottom:40px; right:44px;
    text-align:right; font-size:10px; letter-spacing:0.08em; color: var(--muted);
    line-height:2;
  }
  .hud b{ color: var(--ink); font-weight:500; }
  .hud .swatch{
    display:inline-block; width:8px; height:8px; margin-left:8px;
    border-radius:50%; vertical-align:middle;
    box-shadow: 0 0 6px currentColor;
  }

  /* ---------- pinch charge ring ---------- */
  #ring-wrap{
    position:fixed; top:0; left:0; z-index:5;
    width:76px; height:76px;
    transform: translate(-38px,-38px);
    opacity:0; pointer-events:none;
    transition: opacity .15s ease;
  }
  #ring-wrap.active{ opacity:1; }
  #ring-wrap svg{ width:100%; height:100%; transform: rotate(-90deg); }
  #ring-wrap circle.track{ fill:none; stroke: rgba(234,231,224,0.12); stroke-width:1.5; }
  #ring-wrap circle.fill{ fill:none; stroke: var(--gold); stroke-width:1.5; stroke-linecap:round; }
  #ring-wrap .pct{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:9px; color: var(--gold); letter-spacing:0.05em; transform: none;
  }

  /* ---------- loading overlay ---------- */
  #loading{
    position:fixed; inset:0; z-index:10;
    background: var(--bg);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:16px;
    transition: opacity .6s ease;
  }
  #loading .mark{
    font-family:'Cormorant Garamond', serif; font-style:italic; font-size:30px; color: var(--ink);
  }
  #loading .status{
    font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color: var(--muted);
  }
  #loading.hidden{ opacity:0; pointer-events:none; }
  #loading .err{ color: #c9776f; max-width:360px; text-align:center; font-size:11px; letter-spacing:0.04em; text-transform:none; line-height:1.6; }

  @media (max-width: 640px){
    .title{ font-size:32px; }
    .legend{ display:none; }
    .cam-toggle{ padding:9px 12px; font-size:9px; }
  }
</style>
</head>
<body>

  <video id="webcam" autoplay playsinline muted></video>
  <div id="vignette"></div>
  <canvas id="scene"></canvas>

  <div class="bracket tl"></div>
  <div class="bracket tr"></div>
  <div class="bracket bl"></div>
  <div class="bracket br"></div>

  <div id="ring-wrap">
    <svg viewBox="0 0 76 76">
      <circle class="track" cx="38" cy="38" r="32"></circle>
      <circle class="fill" cx="38" cy="38" r="32" stroke-dasharray="201" stroke-dashoffset="201"></circle>
    </svg>
    <div class="pct">0%</div>
  </div>

  <div class="ui">
    <div class="title-block">
      <p class="title">Aether</p>
      <div class="subtitle">particle field — hand interface</div>
    </div>

    <button class="cam-toggle" id="camToggle"><span class="dot"></span>Webcam background</button>

    <div class="legend">
      <div class="row"><span class="key">One hand</span> move &amp; rotate the field</div>
      <div class="row"><span class="key">Pinch + hold</span> charge, release to burst</div>
      <div class="row"><span class="key">Two hands</span> spread to grow, close to shrink</div>
      <div class="row"><span class="key">Fingers 0–5</span> shift the field's color</div>
    </div>

    <div class="hud">
      <div>hands <b id="hudHands">0</b></div>
      <div>fingers <b id="hudFingers">–</b></div>
      <div>gesture <b id="hudGesture">idle</b><span class="swatch" id="hudSwatch" style="color:#9aa5b1;background:#9aa5b1"></span></div>
    </div>
  </div>

  <div id="loading">
    <div class="mark">Aether</div>
    <div class="status" id="loadingStatus">requesting camera access…</div>
  </div>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- MediaPipe Hands -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

<script>
(function(){
  "use strict";

  /* ============================================================
     CONSTANTS / PALETTE
  ============================================================ */
  const PARTICLE_COUNT = 3000;
  const BASE_RADIUS = 1.6;
  const GOLD = 0xd4af6a;

  // finger-count -> color palette (curated jewel tones)
  const FINGER_COLORS = [
    0x9aa5b1, // 0 — fist  (neutral silver-blue)
    0x5ec8d8, // 1 — cyan
    0x7c83f0, // 2 — periwinkle
    0xe0a15c, // 3 — amber
    0xe56b8f, // 4 — rose
    0x6fd6a0  // 5 — emerald
  ];

  /* ============================================================
     DOM
  ============================================================ */
  const videoEl = document.getElementById('webcam');
  const canvasEl = document.getElementById('scene');
  const loadingEl = document.getElementById('loading');
  const loadingStatus = document.getElementById('loadingStatus');
  const camToggleBtn = document.getElementById('camToggle');
  const ringWrap = document.getElementById('ring-wrap');
  const ringFill = ringWrap.querySelector('circle.fill');
  const ringPct = ringWrap.querySelector('.pct');
  const hudHands = document.getElementById('hudHands');
  const hudFingers = document.getElementById('hudFingers');
  const hudGesture = document.getElementById('hudGesture');
  const hudSwatch = document.getElementById('hudSwatch');

  const RING_CIRC = 2 * Math.PI * 32;

  camToggleBtn.addEventListener('click', () => {
    const on = videoEl.classList.toggle('cam-visible');
    camToggleBtn.classList.toggle('on', on);
  });

  /* ============================================================
     THREE.JS SCENE
  ============================================================ */
  const renderer = new THREE.WebGLRenderer({ canvas: canvasEl, antialias:true, alpha:true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000000, 0);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 100);
  camera.position.set(0, 0, 5.2);

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // soft circular sprite texture for particles
  function makeSpriteTexture(){
    const size = 64;
    const c = document.createElement('canvas');
    c.width = c.height = size;
    const ctx = c.getContext('2d');
    const g = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
    g.addColorStop(0, 'rgba(255,255,255,1)');
    g.addColorStop(0.35, 'rgba(255,255,255,0.75)');
    g.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,size,size);
    return new THREE.CanvasTexture(c);
  }

  function fibonacciSphere(n, radius){
    const pts = new Float32Array(n*3);
    const offset = 2/n;
    const increment = Math.PI * (3 - Math.sqrt(5));
    for(let i=0;i<n;i++){
      const y = ((i*offset) - 1) + (offset/2);
      const r = Math.sqrt(Math.max(0, 1 - y*y));
      const phi = i * increment;
      const x = Math.cos(phi)*r;
      const z = Math.sin(phi)*r;
      pts[i*3]   = x*radius;
      pts[i*3+1] = y*radius;
      pts[i*3+2] = z*radius;
    }
    return pts;
  }

  const basePositions = fibonacciSphere(PARTICLE_COUNT, BASE_RADIUS);
  const currentPositions = basePositions.slice();
  const explodeTargets = new Float32Array(PARTICLE_COUNT*3);
  const brightness = new Float32Array(PARTICLE_COUNT);
  const phase = new Float32Array(PARTICLE_COUNT); // per-particle idle-wobble phase

  for(let i=0;i<PARTICLE_COUNT;i++){
    brightness[i] = 0.55 + Math.random()*0.55;
    phase[i] = Math.random()*Math.PI*2;
  }

  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.BufferAttribute(currentPositions, 3));
  const colorAttr = new Float32Array(PARTICLE_COUNT*3);
  geometry.setAttribute('color', new THREE.BufferAttribute(colorAttr, 3));

  const material = new THREE.PointsMaterial({
    size: 0.028,
    map: makeSpriteTexture(),
    transparent: true,
    depthWrite: false,
    vertexColors: true,
    blending: THREE.AdditiveBlending,
    sizeAttenuation: true
  });

  const points = new THREE.Points(geometry, material);
  const rig = new THREE.Group();
  rig.add(points);
  scene.add(rig);

  // color state
  const currentColor = new THREE.Color(FINGER_COLORS[0]);
  const targetColor = new THREE.Color(FINGER_COLORS[0]);

  /* ============================================================
     GESTURE / SPHERE STATE
  ============================================================ */
  const state = {
    numHands: 0,
    fingerCount: -1,
    handTarget: new THREE.Vector2(0,0),   // -1..1 mapped hand position
    rotVelocity: new THREE.Vector2(0,0),
    targetScale: 1.0,
    currentScale: 1.0,
    pinching: false,
    charge: 0,
    burstState: 'idle', // idle | exploding | reforming
    burstT: 0,
    burstMag: 0,
    lastPinch: false
  };

  const EXPLODE_DUR = 0.55;
  const REFORM_DUR  = 1.05;
  const CHARGE_TIME = 1.15; // seconds to full charge

  function triggerBurst(chargeAmt){
    const mag = BASE_RADIUS * (2.4 + chargeAmt * 7.5);
    for(let i=0;i<PARTICLE_COUNT;i++){
      // random direction across the whole screen, biased slightly by the particle's own direction
      const bx = basePositions[i*3], by = basePositions[i*3+1], bz = basePositions[i*3+2];
      const bl = Math.sqrt(bx*bx+by*by+bz*bz) || 1;
      const rx = (bx/bl)*0.4 + (Math.random()*2-1)*0.9;
      const ry = (by/bl)*0.4 + (Math.random()*2-1)*0.9;
      const rz = (bz/bl)*0.4 + (Math.random()*2-1)*0.6;
      const rl = Math.sqrt(rx*rx+ry*ry+rz*rz) || 1;
      const m = mag * (0.5 + Math.random()*0.8);
      explodeTargets[i*3]   = (rx/rl) * m;
      explodeTargets[i*3+1] = (ry/rl) * m;
      explodeTargets[i*3+2] = (rz/rl) * m;
    }
    state.burstState = 'exploding';
    state.burstT = 0;
    state.burstMag = chargeAmt;
  }

  function easeOutCubic(t){ return 1 - Math.pow(1-t, 3); }
  function easeInOutCubic(t){ return t<0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2; }

  /* ============================================================
     HAND LANDMARK HELPERS
  ============================================================ */
  const TIP = [8,12,16,20];
  const PIP = [6,10,14,18];

  function countFingers(lm, handednessLabel){
    let c = 0;
    // thumb: compare x of tip(4) vs ip(3), direction depends on handedness
    if(handednessLabel === 'Right'){
      if(lm[4].x < lm[3].x) c++;
    } else {
      if(lm[4].x > lm[3].x) c++;
    }
    for(let i=0;i<4;i++){
      if(lm[TIP[i]].y < lm[PIP[i]].y) c++;
    }
    return c;
  }

  function dist(a,b){
    const dx=a.x-b.x, dy=a.y-b.y, dz=(a.z||0)-(b.z||0);
    return Math.sqrt(dx*dx+dy*dy+dz*dz);
  }

  /* ============================================================
     MEDIAPIPE HANDS
  ============================================================ */
  let latestResults = null;

  function onResults(results){
    latestResults = results;
  }

  function processResults(dt){
    if(!latestResults){ return; }
    const hands = latestResults.multiHandLandmarks || [];
    const handedness = latestResults.multiHandedness || [];
    state.numHands = hands.length;

    if(hands.length === 2){
      // two-hand scale gesture
      const c0 = hands[0][9], c1 = hands[1][9];
      const d = dist(c0, c1);
      const t = Math.min(1, Math.max(0, (d - 0.12) / (0.75 - 0.12)));
      state.targetScale = 0.5 + t * 1.9;
      state.pinching = false;
      state.charge = Math.max(0, state.charge - dt*4);
    } else if(hands.length === 1){
      const lm = hands[0];
      const label = (handedness[0] && handedness[0].label) || 'Right';

      // position / rotation from palm center (landmark 9)
      const palm = lm[9];
      const screenX = 1 - palm.x; // mirror to match visual mirror
      const screenY = palm.y;
      const dx = (screenX - 0.5) * 2;
      const dy = (0.5 - screenY) * 2;
      state.handTarget.set(dx, dy);

      // finger count -> color
      const fc = countFingers(lm, label);
      if(fc !== state.fingerCount){
        state.fingerCount = fc;
        targetColor.set(FINGER_COLORS[Math.min(5, Math.max(0, fc))]);
      }

      // pinch detection (thumb tip 4, index tip 8), normalized by hand span (wrist 0 -> middle mcp 9)
      const span = Math.max(0.001, dist(lm[0], lm[9]));
      const pinchDist = dist(lm[4], lm[8]) / span;
      const pinching = pinchDist < 0.42;

      if(pinching){
        state.charge = Math.min(1, state.charge + dt / CHARGE_TIME);
      } else {
        if(state.lastPinch && state.charge > 0.04 && state.burstState === 'idle'){
          triggerBurst(state.charge);
        }
        state.charge = Math.max(0, state.charge - dt*5);
      }
      state.pinching = pinching;
      state.lastPinch = pinching;

      // ring screen position follows pinch midpoint
      const midX = 1 - (lm[4].x + lm[8].x)/2;
      const midY = (lm[4].y + lm[8].y)/2;
      ringWrap.style.left = (midX * window.innerWidth) + 'px';
      ringWrap.style.top = (midY * window.innerHeight) + 'px';

    } else {
      // no hands: relax
      state.handTarget.lerp(new THREE.Vector2(0,0), 0.02);
      state.pinching = false;
      state.lastPinch = false;
      state.charge = Math.max(0, state.charge - dt*5);
    }
  }

  /* ============================================================
     ANIMATION LOOP
  ============================================================ */
  let prevTime = performance.now();

  function animate(){
    requestAnimationFrame(animate);
    const now = performance.now();
    const dt = Math.min(0.05, (now - prevTime)/1000);
    prevTime = now;

    processResults(dt);

    // ---- rotation from hand offset (joystick-style) ----
    const ambient = 0.06;
    rig.rotation.y += ambient*dt + state.handTarget.x * 0.9 * dt;
    rig.rotation.x += state.handTarget.y * -0.6 * dt;
    rig.rotation.x = Math.max(-0.6, Math.min(0.6, rig.rotation.x));

    // ---- position from hand offset ----
    const targetPos = new THREE.Vector3(state.handTarget.x*1.1, state.handTarget.y*0.75, 0);
    rig.position.lerp(targetPos, 1 - Math.pow(0.001, dt));

    // ---- scale from two-hand spread ----
    state.currentScale += (state.targetScale - state.currentScale) * Math.min(1, dt*4);
    rig.scale.setScalar(state.currentScale);

    // ---- color lerp ----
    currentColor.lerp(targetColor, Math.min(1, dt*4));

    // ---- burst state machine ----
    if(state.burstState === 'exploding'){
      state.burstT += dt / EXPLODE_DUR;
      const t = easeOutCubic(Math.min(1, state.burstT));
      for(let i=0;i<PARTICLE_COUNT;i++){
        currentPositions[i*3]   = basePositions[i*3]   + (explodeTargets[i*3]   - basePositions[i*3])*t;
        currentPositions[i*3+1] = basePositions[i*3+1] + (explodeTargets[i*3+1] - basePositions[i*3+1])*t;
        currentPositions[i*3+2] = basePositions[i*3+2] + (explodeTargets[i*3+2] - basePositions[i*3+2])*t;
      }
      if(state.burstT >= 1){ state.burstState = 'reforming'; state.burstT = 0; }
    } else if(state.burstState === 'reforming'){
      state.burstT += dt / REFORM_DUR;
      const t = easeInOutCubic(Math.min(1, state.burstT));
      for(let i=0;i<PARTICLE_COUNT;i++){
        currentPositions[i*3]   = explodeTargets[i*3]   + (basePositions[i*3]   - explodeTargets[i*3])*t;
        currentPositions[i*3+1] = explodeTargets[i*3+1] + (basePositions[i*3+1] - explodeTargets[i*3+1])*t;
        currentPositions[i*3+2] = explodeTargets[i*3+2] + (basePositions[i*3+2] - explodeTargets[i*3+2])*t;
      }
      if(state.burstT >= 1){ state.burstState = 'idle'; }
    } else {
      // idle: gentle organic wobble around base sphere
      const t = now*0.0011;
      for(let i=0;i<PARTICLE_COUNT;i++){
        const w = 0.02 * Math.sin(t*1.6 + phase[i]);
        const bx = basePositions[i*3], by = basePositions[i*3+1], bz = basePositions[i*3+2];
        const bl = Math.sqrt(bx*bx+by*by+bz*bz) || 1;
        currentPositions[i*3]   = bx + (bx/bl)*w;
        currentPositions[i*3+1] = by + (by/bl)*w;
        currentPositions[i*3+2] = bz + (bz/bl)*w;
      }
    }
    geometry.attributes.position.needsUpdate = true;

    // ---- write colors ----
    for(let i=0;i<PARTICLE_COUNT;i++){
      colorAttr[i*3]   = currentColor.r * brightness[i];
      colorAttr[i*3+1] = currentColor.g * brightness[i];
      colorAttr[i*3+2] = currentColor.b * brightness[i];
    }
    geometry.attributes.color.needsUpdate = true;

    // ---- charge ring UI ----
    const showRing = state.pinching || state.charge > 0.02;
    ringWrap.classList.toggle('active', showRing);
    const offset = RING_CIRC * (1 - state.charge);
    ringFill.setAttribute('stroke-dashoffset', offset.toFixed(1));
    ringPct.textContent = Math.round(state.charge*100) + '%';

    // ---- HUD ----
    hudHands.textContent = state.numHands;
    hudFingers.textContent = state.numHands === 1 ? state.fingerCount : '–';
    let gestureLabel = 'idle';
    if(state.burstState === 'exploding') gestureLabel = 'burst';
    else if(state.burstState === 'reforming') gestureLabel = 'reforming';
    else if(state.numHands === 2) gestureLabel = 'scaling';
    else if(state.pinching) gestureLabel = 'charging';
    else if(state.numHands === 1) gestureLabel = 'tracking';
    hudGesture.textContent = gestureLabel;
    const hex = '#' + currentColor.getHexString();
    hudSwatch.style.color = hex;
    hudSwatch.style.background = hex;

    renderer.render(scene, camera);
  }

  /* ============================================================
     BOOTSTRAP: CAMERA + MEDIAPIPE
  ============================================================ */
  async function boot(){
    try{
      loadingStatus.textContent = 'requesting camera access…';
      const stream = await navigator.mediaDevices.getUserMedia({ video: { width:640, height:480 }, audio:false });
      videoEl.srcObject = stream;
      await videoEl.play();

      loadingStatus.textContent = 'loading hand-tracking model…';

      const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
      });
      hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.6,
        minTrackingConfidence: 0.6
      });
      hands.onResults(onResults);

      const mpCamera = new Camera(videoEl, {
        onFrame: async () => { await hands.send({ image: videoEl }); },
        width: 640,
        height: 480
      });
      await mpCamera.start();

      loadingEl.classList.add('hidden');
      animate();
    } catch(err){
      console.error(err);
      loadingStatus.innerHTML = '';
      const msg = document.createElement('div');
      msg.className = 'err';
      msg.textContent = 'Could not start camera or hand-tracking (' + (err && err.message ? err.message : 'unknown error') + '). Allow camera access and reload the page.';
      loadingEl.appendChild(msg);
      // still render an idle sphere so the page isn't dead
      animate();
    }
  }

  boot();

})();
</script>
</body>
</html>
